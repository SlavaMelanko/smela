name: Web CI

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'apps/web/**'
  push:
    branches: [dev, main]
    paths:
      - 'apps/web/**'

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0

jobs:
  ci:
    name: Format, Lint & Tests
    runs-on: ubuntu-latest
    container: oven/bun:1.3.0
    environment: web-test
    defaults:
      run:
        working-directory: apps/web
    env:
      VITE_CAPTCHA_SITE_KEY: ${{ secrets.VITE_CAPTCHA_SITE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format

      - name: Check linting
        run: bun run lint

      - name: Run tests with coverage
        run: NODE_ENV=test npx jest --coverage

      - name: Install dependencies for Codecov
        run: apt-get update && apt-get install -y git curl gpg

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/web/coverage/lcov.info
          flags: web
          fail_ci_if_error: true

  analyze-bundle:
    name: Bundle Analysis (RelativeCI)
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    container: oven/bun:1.3.0
    environment: web-test
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and generate bundle stats
        run: bun run bundle:analyze

      - name: Upload bundle stats to RelativeCI
        uses: relative-ci/agent-action@v3
        with:
          key: ${{ secrets.RELATIVE_CI_KEY }}
          token: ${{ secrets.GITHUB_TOKEN }}
          webpackStatsFile: apps/web/dist/webpack-stats.json
