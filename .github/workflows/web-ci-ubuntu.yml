name: Web CI

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'apps/web/**'
      - 'packages/eslint/**'
      - 'packages/i18n/**'
      - 'packages/ui/**'
  push:
    branches: [dev, main]
    paths:
      - 'apps/web/**'
      - 'packages/eslint/**'
      - 'packages/i18n/**'
      - 'packages/ui/**'

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: 0

jobs:
  ci:
    name: Format, Lint & Tests
    runs-on: ubuntu-latest
    container: oven/bun:1.3.11
    environment: web-test
    env:
      VITE_APP_NAME: SMELA-CI
      VITE_CAPTCHA_SITE_KEY: ${{ secrets.VITE_CAPTCHA_SITE_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:web

      - name: Check linting
        run: bun run lint:web

      - name: Run tests with coverage
        run: bun run coverage:web

      - name: Install dependencies for Codecov
        run: apt-get update && apt-get install -y git curl gpg

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/ui/coverage/lcov.info
          flags: web
          fail_ci_if_error: true
