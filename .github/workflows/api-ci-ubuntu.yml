name: API CI

on:
  pull_request:
    branches: [main, dev]
    paths:
      - 'apps/api/**'
  push:
    branches: [main, dev]
    paths:
      - 'apps/api/**'

jobs:
  ci:
    name: Lint, Type Check & Tests
    runs-on: ubuntu-latest
    container: oven/bun:1.3.0
    environment: api-test
    defaults:
      run:
        working-directory: apps/api

    env:
      LOG_LEVEL: ${{ vars.LOG_LEVEL }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      COOKIE_REFRESH_TOKEN_NAME: ${{ vars.COOKIE_REFRESH_TOKEN_NAME }}
      COOKIE_REFRESH_TOKEN_EXPIRATION: ${{ vars.COOKIE_REFRESH_TOKEN_EXPIRATION }}
      EMAIL_RESEND_API_KEY: ${{ secrets.EMAIL_RESEND_API_KEY }}
      EMAIL_SENDER_PROFILES: ${{ vars.EMAIL_SENDER_PROFILES }}
      COMPANY_NAME: ${{ vars.COMPANY_NAME }}
      COMPANY_SOCIAL_LINKS: ${{ vars.COMPANY_SOCIAL_LINKS }}
      CAPTCHA_SECRET_KEY: ${{ secrets.CAPTCHA_SECRET_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linting
        run: bun run lint

      - name: Run type checking
        run: bun run tsc

      - name: Run tests with coverage
        run: bun run coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage-${{ github.sha }}
          path: apps/api/coverage/lcov.info
          retention-days: 1

  coverage:
    name: Coverage
    needs: ci
    uses: ./.github/workflows/coverage.yml
    with:
      app_name: api
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
